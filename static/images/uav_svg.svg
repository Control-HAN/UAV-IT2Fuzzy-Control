<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="circle-cut">
      <circle cx="50" cy="50" r="50" />
    </clipPath>
    <clipPath id="top-half">
      <rect x="0" y="0" width="100" height="50" />
    </clipPath>
    <clipPath id="bottom-half">
      <rect x="0" y="50" width="100" height="50" />
    </clipPath>
    
    <g id="drone-icon">
      <line x1="22" y1="22" x2="78" y2="78" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
      <line x1="22" y1="78" x2="78" y2="22" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
      <circle cx="22" cy="22" r="8" fill="none" stroke="currentColor" stroke-width="4"/>
      <circle cx="78" cy="22" r="8" fill="none" stroke="currentColor" stroke-width="4"/>
      <circle cx="22" cy="78" r="8" fill="none" stroke="currentColor" stroke-width="4"/>
      <circle cx="78" cy="78" r="8" fill="none" stroke="currentColor" stroke-width="4"/>
      <rect x="38" y="38" width="24" height="24" rx="6" fill="currentColor"/>
    </g>
  </defs>

  <g clip-path="url(#circle-cut)">
    <rect x="0" y="0" width="100" height="50" fill="#2B74F0" />
    <rect x="0" y="50" width="100" height="50" fill="#FCE13A" />
  </g>

  <g clip-path="url(#top-half)" color="#FCE13A">
    <use href="#drone-icon" />
  </g>

  <g clip-path="url(#bottom-half)" color="#2B74F0">
    <use href="#drone-icon" />
  </g>
</svg>
